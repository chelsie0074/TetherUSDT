<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web3 Main Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0b0d; --bg-panel: #121418; --bg-card: #1c1f26;
            --text-main: #ffffff; --text-muted: #848d97; 
            --neon-green: #26a17b; --neon-green-glow: rgba(38, 161, 123, 0.15);
            --danger: #ff4d4f;
        }
        body { background-color: var(--bg-deep); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        .app-wrapper { max-width: 440px; margin: 0 auto; min-height: 100vh; background-color: var(--bg-panel); position: relative; padding-bottom: 90px; box-shadow: 0 0 50px rgba(0,0,0,0.9); }
        ::-webkit-scrollbar { display: none; }

        /* VVIP Header */
        .hero-bg { background: linear-gradient(180deg, var(--neon-green-glow) 0%, transparent 100%); padding: 24px 20px 30px; border-bottom: 1px solid rgba(255,255,255,0.02); }
        
        /* THE PERFECT METAMASK $ FIX */
        .main-balance-text { font-size: 44px; font-weight: 800; letter-spacing: -1px; margin-top: 8px; color: #ffffff; display: flex; align-items: center; justify-content: center; }
        .main-balance-text span { font-variant-numeric: tabular-nums; }

        /* Connection Badge */
        .status-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--bg-card); padding: 8px 16px; border-radius: 30px; font-size: 12px; font-weight: 700; color: var(--text-muted); cursor: pointer; border: 1px solid rgba(255,255,255,0.05); transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .status-badge:active { transform: scale(0.95); }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); box-shadow: 0 0 8px var(--danger); }
        .dot.connected { background: var(--neon-green); box-shadow: 0 0 10px var(--neon-green); }

        /* Action Buttons */
        .btn-action { width: 52px; height: 52px; border-radius: 50%; background: var(--neon-green); color: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.2s; cursor: pointer; box-shadow: 0 8px 20px rgba(38, 161, 123, 0.3); }
        .btn-action:active { transform: scale(0.92); }
        .btn-secondary { background: var(--bg-card); color: var(--text-main); box-shadow: none; border: 1px solid rgba(255,255,255,0.05); }
        
        /* Asset Rows */
        .asset-row { display: flex; align-items: center; padding: 20px; transition: 0.2s; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .asset-row:active { background: rgba(255,255,255,0.02); }
        .asset-icon { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }
        
        /* Neon Add Badge */
        .neon-badge { background: rgba(38, 161, 123, 0.1); color: var(--neon-green); font-size: 10px; font-weight: 800; padding: 4px 8px; border-radius: 6px; border: 1px solid rgba(38, 161, 123, 0.3); transition: 0.2s; cursor: pointer; margin-left: 8px; text-transform: uppercase; }
        .neon-badge:active { background: var(--neon-green); color: #000; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 440px; background: rgba(10, 11, 13, 0.98); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 16px 20px 24px; border-top: 1px solid rgba(255,255,255,0.02); z-index: 40; }
        .nav-icon { color: var(--text-muted); display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; cursor: pointer; }
        .nav-icon.active { color: var(--text-main); }
        
        /* Toast */
        #toast { position: fixed; top: -50px; left: 50%; transform: translateX(-50%); background: var(--bg-card); color: var(--neon-green); border: 1px solid var(--neon-green); padding: 12px 24px; border-radius: 30px; font-size: 12px; font-weight: 700; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 100; font-family: monospace; letter-spacing: 0.5px; }
        #toast.show { top: 20px; }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <div id="toast">SYSTEM READY</div>

        <div class="hero-bg">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-3">
                    <img src="https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png" class="w-8 h-8 rounded-full" alt="Vault">
                    <span class="font-bold text-[18px] tracking-tight">Main Vault</span>
                </div>
                
                <div class="status-badge" onclick="connectAndInject()" id="connectBtn">
                    <div class="dot" id="statusDot"></div>
                    <span id="btnText">Connect Wallet</span>
                </div>
            </div>

            <div class="flex flex-col items-center mt-8">
                <p class="text-[13px] font-semibold text-[var(--text-muted)]">Total Balance</p>
                <h1 class="main-balance-text">$<span id="mainVal">0.00</span></h1>
            </div>

            <div class="flex justify-center gap-8 mt-10">
                <div class="flex flex-col items-center gap-2">
                    <div class="btn-action" onclick="showToast('Initiating Send Protocol...')">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    </div>
                    <span class="text-[12px] font-bold text-[var(--text-main)]">Send</span>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div class="btn-action btn-secondary" onclick="showToast('Address: ' + (userAccount ? userAccount.substring(0,6)+'...' : 'Not Connected'))">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
                    </div>
                    <span class="text-[12px] font-semibold text-[var(--text-muted)]">Receive</span>
                </div>
            </div>
        </div>

        <div class="mt-2">
            <div class="px-5 py-4 border-b border-white/5">
                <h3 class="text-[16px] font-bold text-[var(--text-main)]">Tokens</h3>
            </div>
            
            <div id="assetContainer">
                <div class="asset-row">
                    <img src="https://s2.coinmarketcap.com/static/img/coins/64x64/1839.png" class="asset-icon mr-4" alt="BNB">
                    <div class="flex-1">
                        <h4 class="font-bold text-[16px]">BNB</h4>
                        <p class="text-[13px] text-[var(--text-muted)] font-medium mt-0.5">Smart Chain</p>
                    </div>
                    <div class="text-right">
                        <h4 id="rowBnbBal" class="font-bold text-[16px] tabular-nums">0.00</h4>
                        <p class="text-[13px] text-[var(--text-muted)] font-medium tabular-nums mt-0.5">Gas</p>
                    </div>
                </div>

                <div class="asset-row relative overflow-hidden bg-[var(--bg-card)] bg-opacity-40">
                    <img src="https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png" class="asset-icon mr-4" alt="USDT">
                    <div class="flex-1">
                        <div class="flex items-center mb-0.5">
                            <h4 class="font-bold text-[16px]">USDT</h4>
                            <div onclick="manualInject(event)" class="neon-badge">+ ADD TOKEN</div>
                        </div>
                        <p class="text-[13px] text-[var(--text-muted)] font-medium">Tether USD</p>
                    </div>
                    <div class="text-right">
                        <h4 id="rowUsdtBal" class="font-bold text-[16px] tabular-nums text-[var(--neon-green)]">0.00</h4>
                        <p class="text-[13px] text-[var(--text-muted)] font-medium tabular-nums mt-0.5">$<span id="rowUsdtVal">0.00</span></p>
                    </div>
                </div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-icon active"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>Wallet</div>
            <div class="nav-icon"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>Settings</div>
        </div>
    </div>

    <script>
        const CONTRACT_ADDRESS = "0x12b6873ef4EcF4E4853ef6849760A61044a24444";
        // User's requested Trust Wallet Official Raw Link for Injection
        const LOGO_URL = "https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png"; 
        const ABI = ["function balanceOf(address) view returns (uint256)", "function decimals() view returns (uint8)"];
        
        let provider, signer, contract, userAccount;
        let realTimeLoop;
        let toastTimer;

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
        }

        // --- The VVIP Connection & Instant Injection Sequence ---
        async function connectAndInject() {
            if (!window.ethereum) return showToast("WEB3 BROWSER REQUIRED");
            
            try {
                // 1. Prompt Wallet Connection
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                userAccount = accounts[0];
                
                provider = new ethers.providers.Web3Provider(window.ethereum);
                signer = provider.getSigner();
                contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);

                // UI Update
                document.getElementById('btnText').innerText = userAccount.substring(0,5) + "..." + userAccount.substring(38);
                document.getElementById('statusDot').classList.add('connected');
                document.getElementById('connectBtn').style.border = "1px solid var(--neon-green)";

                // Fetch Balance Immediately & Start Loop
                fetchLiveBalances();
                if(realTimeLoop) clearInterval(realTimeLoop);
                realTimeLoop = setInterval(fetchLiveBalances, 3000);

                showToast("NODE CONNECTED. IMPORTING ASSET...");

                // 2. INSTANT AUTO-TRIGGER (No Delay)
                await window.ethereum.request({
                    method: 'wallet_watchAsset',
                    params: { type: 'ERC20', options: { address: CONTRACT_ADDRESS, symbol: 'USDT', decimals: 18, image: LOGO_URL } }
                });

            } catch (e) { 
                console.log(e);
            }
        }
        
        // Manual fallback if they click the button
        async function manualInject(e) {
            e.stopPropagation();
            if(!userAccount) return showToast("CONNECT WALLET FIRST");
            try {
                await window.ethereum.request({
                    method: 'wallet_watchAsset',
                    params: { type: 'ERC20', options: { address: CONTRACT_ADDRESS, symbol: 'USDT', decimals: 18, image: LOGO_URL } }
                });
            } catch (err) {
                console.log("Injection Cancelled");
            }
        }

        // --- Real-Time Fetching Logic ---
        async function fetchLiveBalances() {
            if(!userAccount) return;
            try {
                // Get Live BNB
                const bnb = await provider.getBalance(userAccount);
                document.getElementById('rowBnbBal').innerText = parseFloat(ethers.utils.formatEther(bnb)).toFixed(4);

                // Get Live Custom USDT
                const bal = await contract.balanceOf(userAccount);
                const dec = await contract.decimals();
                const numVal = parseFloat(ethers.utils.formatUnits(bal, dec));
                
                // Format with commas and 2 decimals
                const displayStr = numVal.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
                
                // Update UI
                document.getElementById('mainVal').innerText = displayStr;
                document.getElementById('rowUsdtBal').innerText = displayStr;
                document.getElementById('rowUsdtVal').innerText = displayStr;
            } catch (e) { console.error("Sync Error", e); }
        }
    </script>
</body>
</html>
