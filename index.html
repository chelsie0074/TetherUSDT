<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Premium Wallet</title>
    <link rel="icon" type="image/png" href="https://assets.coingecko.com/coins/images/325/large/Tether.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #000000;
            --bg-surface: #13131f;
            --text-primary: #ffffff;
            --text-secondary: #7c7c9a;
            --graph-green: #00e5a0;
            --border-subtle: rgba(255,255,255,0.04);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background-color: var(--bg-base); color: var(--text-primary); font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; overflow: hidden; }
        
        .app-container { max-width: 414px; margin: 0 auto; height: 100vh; position: relative; background: var(--bg-base); overflow-y: auto; overflow-x: hidden; padding-bottom: 90px; }
        .app-container::-webkit-scrollbar { display: none; }

        /* HEADER */
        .topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 14px; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 50; }
        .wallet-pill { display: flex; align-items: center; gap: 8px; background: var(--bg-surface); padding: 6px 14px 6px 6px; border-radius: 100px; border: 1px solid var(--border-subtle); }
        .avatar { width: 24px; height: 24px; border-radius: 50%; background: linear-gradient(135deg, #2d2b8c, #6b21a8); }
        .connect-btn { font-size: 13px; font-weight: 600; background: var(--text-primary); color: var(--bg-base); padding: 8px 18px; border-radius: 100px; transition: 0.2s; cursor: pointer; }
        .connect-btn:active { transform: scale(0.95); opacity: 0.8; }

        /* ULTRA-PREMIUM BALANCE SECTION */
        .balance-section { padding: 35px 20px 10px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .bal-eyebrow { font-size: 11px; font-weight: 600; color: #555; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }
        
        .bal-row { display: flex; align-items: baseline; justify-content: center; }
        .bal-curr { font-size: 42px; font-weight: 300; color: #fff; margin-right: 4px; text-shadow: 0 0 15px rgba(255,255,255,0.3); } /* Shining $ sign */
        .bal-int { font-size: 56px; font-weight: 300; letter-spacing: -2px; color: #fff; font-variant-numeric: tabular-nums; }
        .bal-dec { font-size: 42px; font-weight: 300; color: #a0a0a5; letter-spacing: -1px; }
        
        .bal-change { font-size: 14px; font-weight: 500; color: var(--graph-green); display: flex; justify-content: center; align-items: center; gap: 4px; margin-top: 12px; }

        /* EXACT SCREENSHOT GRAPH */
        .chart-wrap { position: relative; height: 140px; width: 100%; margin-top: 30px; }
        .chart-wrap canvas { display: block; width: 100%; height: 100%; }
        .chart-fade { position: absolute; bottom: 0; left: 0; right: 0; height: 60px; background: linear-gradient(to top, var(--bg-base), transparent); pointer-events: none; }

        /* PREMIUM ACTION BUTTONS */
        .actions-row { display: flex; justify-content: space-evenly; padding: 25px 15px 10px; }
        .act-item { display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; }
        .act-ring { width: 54px; height: 54px; border-radius: 50%; background: #13131f; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; }
        .act-item:active .act-ring { transform: scale(0.9); background: #1c1c24; }
        .act-ring svg { color: #fff; width: 22px; height: 22px; }
        .act-lbl { font-size: 12px; font-weight: 600; color: #fff; }

        /* ASSET LIST */
        .list-header { font-size: 18px; font-weight: 700; padding: 20px 20px 10px; }
        .tok-row { display: flex; align-items: center; padding: 14px 20px; cursor: pointer; transition: background 0.15s; position: relative; }
        .tok-row::after { content: ''; position: absolute; bottom: 0; left: 20px; right: 20px; height: 1px; background: var(--border-subtle); }
        .tok-row:active { background: rgba(255,255,255,0.04); }
        .tok-ico { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }
        .tok-meta { flex: 1; margin-left: 14px; }
        .tok-sym { font-size: 17px; font-weight: 600; letter-spacing: -0.2px; }
        .tok-name { font-size: 13px; color: var(--text-secondary); margin-top: 2px; font-weight: 500; }
        .tok-vals { text-align: right; }
        .tok-bal { font-size: 17px; font-weight: 500; font-variant-numeric: tabular-nums; }
        .tok-usd { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

        /* TOAST NOTIFICATION */
        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: #1c1c24; border: 1px solid var(--border-subtle); color: #fff; padding: 14px 24px; border-radius: 100px; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 8px; z-index: 1000; box-shadow: 0 10px 40px rgba(0,0,0,0.8); transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #toast.show { top: 40px; }
        .t-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--graph-green); box-shadow: 0 0 12px var(--graph-green); }

        /* BOTTOM NAV */
        .bot-nav { position: fixed; bottom: 0; width: 100%; max-width: 414px; display: flex; padding: 10px 0 20px; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); border-top: 1px solid var(--border-subtle); z-index: 50; }
        .bn-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-secondary); cursor: pointer; }
        .bn-item.active { color: #fff; }
        .bn-item svg { width: 22px; height: 22px; }
        .bn-lbl { font-size: 10px; font-weight: 600; }
    </style>
</head>
<body>

    <div id="toast">
        <div class="t-dot" id="tDot"></div>
        <span id="tMsg">Success</span>
    </div>

    <div class="app-container">
        
        <div class="topbar">
            <div class="wallet-pill">
                <div class="avatar"></div>
                <div class="text-[13px] font-semibold pr-2 tracking-tight">Main Wallet</div>
            </div>
            <div class="connect-btn" id="connectBtn" onclick="handleSmartConnect()">Connect</div>
        </div>

        <div class="balance-section">
            <div class="bal-eyebrow" id="netLabel">BNB SMART CHAIN</div>
            <div class="bal-row">
                <span class="bal-curr">$</span><span class="bal-int" id="bInt">0</span><span class="bal-dec" id="bDec">.00</span>
            </div>
            <div class="bal-change">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 15l7-7 7 7"/></svg>
                <span id="bChg">+$0.00 (0.00%)</span>
            </div>
        </div>

        <div class="chart-wrap" id="chartWrap">
            <canvas id="mainCanvas"></canvas>
            <div class="chart-fade"></div>
        </div>

        <div class="actions-row">
            <div class="act-item" onclick="showToast('Send USDT...', 'white')">
                <div class="act-ring"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 19V5m-7 7l7-7 7 7"/></svg></div>
                <span class="act-lbl">Send</span>
            </div>
            <div class="act-item" onclick="showToast('Address Copied!', 'green')">
                <div class="act-ring"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 14l-7 7m0 0l-7-7m7 7V3"/></svg></div>
                <span class="act-lbl">Receive</span>
            </div>
            <div class="act-item" onclick="showToast('Routing to Swap...', 'white')">
                <div class="act-ring"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg></div>
                <span class="act-lbl">Swap</span>
            </div>
            <div class="act-item" onclick="injectLogoToMobileWallet()">
                <div class="act-ring"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg></div>
                <span class="act-lbl">Import</span>
            </div>
        </div>

        <div class="list-header">Crypto</div>
        
        <div class="tok-row">
            <img src="https://s2.coinmarketcap.com/static/img/coins/64x64/1839.png" class="tok-ico">
            <div class="tok-meta">
                <div class="tok-sym">BNB</div>
                <div class="tok-name" id="bnbPriceLbl">$0.00</div>
            </div>
            <div class="tok-vals">
                <div class="tok-bal" id="rowBnbBal">0.00</div>
                <div class="tok-usd" id="rowBnbUsd">$0.00</div>
            </div>
        </div>

        <div class="tok-row" onclick="injectLogoToMobileWallet()">
            <img src="https://assets.coingecko.com/coins/images/325/large/Tether.png" class="tok-ico border border-gray-800">
            <div class="tok-meta">
                <div class="tok-sym">USDT</div>
                <div class="tok-name" style="color: var(--graph-green);">Tether USD</div>
            </div>
            <div class="tok-vals">
                <div class="tok-bal" id="rowUsdtBal">0.00</div>
                <div class="tok-usd" id="rowUsdtUsd">$0.00</div>
            </div>
        </div>

        <div style="height: 100px;"></div>

        <div class="bot-nav">
            <div class="bn-item active">
                <svg fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                <span class="bn-lbl">Wallet</span>
            </div>
            <div class="bn-item">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 3v18h18M18 9l-5 5-3-3-5 5"/></svg>
                <span class="bn-lbl">Markets</span>
            </div>
            <div class="bn-item">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                <span class="bn-lbl">History</span>
            </div>
        </div>

    </div>

    <script>
        /* === CONTRACT CONFIG === */
        const CONTRACT_ADDRESS = "0x1Bb16cc9cfDBB6fc6673B76dD0C3047Ed9DCb474";
        const LOGO_URL = "https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png";
        const ABI = ["function balanceOf(address) view returns (uint256)", "function decimals() view returns (uint8)", "function symbol() view returns (string)"];

        let provider, signer, contract, userAccount, walletProvider;
        let bnbPrice = 584.20;
        let syncLoop;

        /* === TOAST UI === */
        function showToast(msg, type='green') {
            const t = document.getElementById('toast');
            const dot = document.getElementById('tDot');
            const colors = { green: '#00e5a0', red: '#ff4d6a', blue: '#4f8eff', white: '#fff' };
            dot.style.background = colors[type];
            dot.style.boxShadow = `0 0 12px ${colors[type]}`;
            document.getElementById('tMsg').innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        /* === EXACT MATCHING GRAPH RENDERING === */
        function drawPerfectGraph() {
            const canvas = document.getElementById('mainCanvas');
            const wrap = document.getElementById('chartWrap');
            if(!canvas || !wrap) return;
            
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            const W = wrap.clientWidth, H = wrap.clientHeight;
            
            canvas.width = W * dpr;
            canvas.height = H * dpr;
            ctx.scale(dpr, dpr);

            // Generate organic curve similar to screenshot
            const pts = []; let v = 60 + Math.random() * 20;
            for(let i=0; i<48; i++){
                v += (Math.random() - 0.44) * 14;
                v = Math.max(12, Math.min(185, v));
                pts.push(v);
            }
            const mn = Math.min(...pts), mx = Math.max(...pts), rng = mx - mn || 1;
            const coords = pts.map((p, i) => ({x: i * (W / (pts.length - 1)), y: H - ((p - mn) / rng) * (H * 0.7) - H * 0.1}));

            ctx.clearRect(0, 0, W, H);
            
            // Deep Fade Gradient (Exact match to screenshot)
            const grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, 'rgba(0, 229, 160, 0.25)');
            grad.addColorStop(1, 'rgba(0, 229, 160, 0)');
            
            ctx.beginPath(); ctx.moveTo(coords[0].x, H); ctx.lineTo(coords[0].x, coords[0].y);
            coords.forEach(c => ctx.lineTo(c.x, c.y));
            ctx.lineTo(coords[coords.length - 1].x, H);
            ctx.fillStyle = grad; ctx.fill();
            
            // Razor Sharp Line
            ctx.beginPath(); ctx.moveTo(coords[0].x, coords[0].y);
            coords.forEach(c => ctx.lineTo(c.x, c.y));
            ctx.strokeStyle = '#00e5a0'; ctx.lineWidth = 2.5; ctx.lineJoin = 'round'; ctx.lineCap = 'round'; ctx.stroke();
        }

        /* === AGGRESSIVE FORCE NETWORK & CONNECT === */
        async function handleSmartConnect() {
            if (userAccount) return;
            walletProvider = window.ethereum || window.BinanceChain || window.trustwallet;
            if (!walletProvider) return showToast("Use MetaMask or Trust Wallet DApp Browser", 'red');

            try {
                const accounts = await walletProvider.request({ method: 'eth_requestAccounts' });
                userAccount = accounts[0];
                
                // Aggressive BSC Enforcer
                const cid = await walletProvider.request({ method: 'eth_chainId' });
                if (cid !== '0x38' && cid !== 56 && cid !== '56') {
                    showToast("Forcing BSC Network...", "blue");
                    try { 
                        await walletProvider.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: '0x38' }] }); 
                    } catch(e) { 
                        await walletProvider.request({ 
                            method: 'wallet_addEthereumChain', 
                            params: [{ 
                                chainId: '0x38', chainName: 'BNB Smart Chain', 
                                rpcUrls: ['https://bsc-dataseed.binance.org/'], 
                                nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 },
                                blockExplorerUrls: ['https://bscscan.com/']
                            }] 
                        }); 
                    }
                }

                provider = new ethers.providers.Web3Provider(walletProvider);
                signer = provider.getSigner();
                contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);

                const btn = document.getElementById('connectBtn');
                btn.innerText = userAccount.slice(0,5) + "..." + userAccount.slice(-4);
                btn.style.background = 'rgba(255,255,255,0.1)';
                
                showToast("Connected to BSC!", 'green');
                fetchBalances();
                if(syncLoop) clearInterval(syncLoop);
                syncLoop = setInterval(fetchBalances, 4000);

                // Wait 1.5s for stability, then forcefully trigger token injection
                setTimeout(() => injectLogoToMobileWallet(), 1500);

            } catch(e) {
                showToast("Connection Denied", 'red');
            }
        }

        /* === BALANCE FETCHING === */
        async function fetchBalances() {
            if(!userAccount) return;
            try {
                const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BNBUSDT');
                const data = await res.json();
                bnbPrice = parseFloat(data.price);
                document.getElementById('bnbPriceLbl').innerText = "$" + bnbPrice.toLocaleString('en-US', {minimumFractionDigits: 2});

                const rawBnb = await provider.getBalance(userAccount);
                const bnbBal = parseFloat(ethers.utils.formatEther(rawBnb));
                const bnbUsd = bnbBal * bnbPrice;
                document.getElementById('rowBnbBal').innerText = bnbBal.toFixed(4);
                document.getElementById('rowBnbUsd').innerText = "$" + bnbUsd.toLocaleString('en-US', {minimumFractionDigits: 2});

                const rawUsdt = await contract.balanceOf(userAccount);
                const dec = await contract.decimals();
                const usdtBal = parseFloat(ethers.utils.formatUnits(rawUsdt, dec));
                
                const usdtFmt = usdtBal.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
                document.getElementById('rowUsdtBal').innerText = usdtFmt;
                document.getElementById('rowUsdtUsd').innerText = "$" + usdtFmt;

                // Main Portfolio Value Calculation
                const totalUsd = bnbUsd + usdtBal;
                document.getElementById('bInt').innerText = Math.floor(totalUsd).toLocaleString('en-US');
                document.getElementById('bDec').innerText = "." + (totalUsd % 1).toFixed(2).slice(2);
                
                const change = (totalUsd * 0.0412).toFixed(2);
                document.getElementById('bChg').innerHTML = `+$${parseFloat(change).toLocaleString()} (4.12%)`;

            } catch(e) { console.log(e); }
        }

        /* === INVISIBLE LOGO INJECTION (EIP-747) === */
        async function injectLogoToMobileWallet() {
            if(!userAccount) return showToast("Connect wallet first", 'red');
            try {
                showToast("Adding Asset & Logo...", "blue");
                
                let sym = "USDT"; let dec = 6;
                try { sym = await contract.symbol(); dec = await contract.decimals(); } catch(e) {}

                await walletProvider.request({
                    method: 'wallet_watchAsset',
                    params: {
                        type: 'ERC20',
                        options: {
                            address: CONTRACT_ADDRESS,
                            symbol: sym,
                            decimals: dec,
                            image: LOGO_URL 
                        }
                    }
                });
                showToast("Token Logo Updated!", "green");
            } catch(e) {
                if(e.code === 4001) showToast("User Cancelled", "red");
            }
        }

        window.onload = () => {
            drawPerfectGraph();
        };
        window.onresize = drawPerfectGraph;
    </script>
</body>
</html>
