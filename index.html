<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Main Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root {
            --bg-dark: #0b0e11;
            --surface: #181a20;
            --text-main: #f5f5f5;
            --text-muted: #848e9c;
            --tether-green: #26a17b;
        }
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .app-container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            background-color: var(--bg-dark);
            padding-bottom: 40px;
        }
        ::-webkit-scrollbar { display: none; }
        
        .balance-section {
            display: flex; flex-direction: column; align-items: center; padding: 30px 20px 20px;
        }
        .main-balance { font-size: 46px; font-weight: 700; letter-spacing: -1px; }
        .action-btn {
            background: var(--surface); border-radius: 50%; width: 52px; height: 52px;
            display: flex; align-items: center; justify-content: center; margin-bottom: 8px;
        }
        .token-item {
            display: flex; align-items: center; padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .import-badge {
            background: rgba(38, 161, 123, 0.15); color: var(--tether-green);
            font-size: 10px; font-weight: 700; padding: 4px 8px; border-radius: 12px;
            text-transform: uppercase; display: flex; align-items: center; gap: 4px; border: 1px solid rgba(38, 161, 123, 0.3);
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="flex justify-between items-center px-5 pt-4">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center shadow-lg shadow-blue-500/30">
                    <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                </div>
                <span class="font-semibold text-lg">Main Wallet 1</span>
            </div>
            <button onclick="connectWallet()" id="connectBtn" class="text-xs font-semibold bg-[#181a20] px-4 py-2 rounded-full border border-gray-800 text-gray-300">
                Connect
            </button>
        </div>

        <div class="balance-section">
            <p class="text-sm font-medium text-gray-400 mb-1">Total Portfolio Value</p>
            <div class="flex items-start justify-center">
                <span class="text-2xl font-medium text-gray-400 mt-1 mr-1">$</span>
                <span id="mainUsdBal" class="main-balance">0.00</span>
            </div>
            <p class="text-xs font-medium text-green-500 mt-2 bg-green-500/10 px-2.5 py-1 rounded-md">+0.00% Today</p>
        </div>

        <div class="flex justify-center gap-6 px-5 mt-4 mb-8">
            <div class="flex flex-col items-center">
                <div class="action-btn text-blue-400"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg></div>
                <span class="text-xs font-medium text-gray-300">Send</span>
            </div>
            <div class="flex flex-col items-center">
                <div class="action-btn text-blue-400"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg></div>
                <span class="text-xs font-medium text-gray-300">Receive</span>
            </div>
        </div>

        <div class="border-t border-gray-800/60 pt-2">
            <div class="px-5 py-3 flex justify-between items-center">
                <h3 class="text-[15px] font-bold">Assets</h3>
            </div>
            <div id="tokenContainer"></div>
        </div>
    </div>

    <script>
        const CONTRACT_ADDRESS = "0x12b6873ef4EcF4E4853ef6849760A61044a24444";
        // OFFICIAL COINMARKETCAP STATIC IMAGE (100% Reliable)
        const LOGO_URL = "https://s2.coinmarketcap.com/static/img/coins/64x64/825.png";
        const ABI = ["function balanceOf(address) view returns (uint256)", "function decimals() view returns (uint8)"];

        let provider, signer, contract, userAccount;

        // 14 Tokens using CoinMarketCap official API IDs for images (No hotlinking blocks)
        const tokens = [
            { id: "bnb", name: "BNB", symbol: "BNB", imgId: "1839", price: "$582.40" },
            { id: "usdt", name: "Tether USD", symbol: "USDT", imgId: "825", price: "$1.00", isCustom: true }, 
            { id: "btc", name: "Bitcoin", symbol: "BTC", imgId: "1", price: "$68,420.50" },
            { id: "eth", name: "Ethereum", symbol: "ETH", imgId: "1027", price: "$3,450.10" },
            { id: "sol", name: "Solana", symbol: "SOL", imgId: "5426", price: "$145.20" },
            { id: "xrp", name: "XRP", symbol: "XRP", imgId: "52", price: "$0.62" },
            { id: "ada", name: "Cardano", symbol: "ADA", imgId: "2010", price: "$0.45" },
            { id: "avax", name: "Avalanche", symbol: "AVAX", imgId: "5805", price: "$48.30" },
            { id: "doge", name: "Dogecoin", symbol: "DOGE", imgId: "74", price: "$0.15" },
            { id: "dot", name: "Polkadot", symbol: "DOT", imgId: "6636", price: "$8.90" },
            { id: "matic", name: "Polygon", symbol: "MATIC", imgId: "3890", price: "$0.92" },
            { id: "link", name: "Chainlink", symbol: "LINK", imgId: "1975", price: "$18.40" },
            { id: "ltc", name: "Litecoin", symbol: "LTC", imgId: "2", price: "$82.10" },
            { id: "shib", name: "Shiba Inu", symbol: "SHIB", imgId: "5994", price: "$0.000028" }
        ];

        function renderTokens() {
            const container = document.getElementById('tokenContainer');
            container.innerHTML = '';
            
            tokens.forEach(t => {
                const isVIP = t.isCustom;
                // CoinMarketCap static image URL pattern
                const imgSrc = `https://s2.coinmarketcap.com/static/img/coins/64x64/${t.imgId}.png`;
                
                const nameSection = isVIP 
                    ? `<div class="flex items-center gap-2">
                         <h4 class="font-semibold text-[15px]">${t.name}</h4>
                         <div onclick="addCustomToken(event)" class="import-badge">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"></path></svg> Import
                         </div>
                       </div>`
                    : `<h4 class="font-semibold text-[15px]">${t.name}</h4>`;

                container.innerHTML += `
                <div class="token-item">
                    <img src="${imgSrc}" class="w-10 h-10 rounded-full mr-4" alt="${t.symbol}">
                    <div class="flex-1">
                        ${nameSection}
                        <p class="text-[13px] text-gray-500 font-medium">${t.price}</p>
                    </div>
                    <div class="text-right">
                        <h4 id="${isVIP ? 'usdtBal' : ''}" class="font-semibold text-[15px]">${isVIP ? '0.00' : '0.00'}</h4>
                        <p id="${isVIP ? 'usdtVal' : ''}" class="text-[13px] text-gray-500 font-medium">$0.00</p>
                    </div>
                </div>`;
            });
        }

        async function connectWallet() {
            if (!window.ethereum) return alert("Browser error: window.ethereum not found. Use Trust Wallet browser.");
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                userAccount = accounts[0];
                document.getElementById('connectBtn').innerText = userAccount.substring(0,5) + "..." + userAccount.substring(38);
                
                provider = new ethers.providers.Web3Provider(window.ethereum);
                signer = provider.getSigner();
                contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
                
                fetchMyData();
            } catch (e) { alert("Connection Error: " + e.message); }
        }

        async function fetchMyData() {
            try {
                const bal = await contract.balanceOf(userAccount);
                const dec = await contract.decimals();
                const formatted = parseFloat(ethers.utils.formatUnits(bal, dec)).toLocaleString('en-US', {minimumFractionDigits: 2});
                
                document.getElementById('usdtBal').innerText = formatted;
                document.getElementById('usdtBal').classList.add("text-green-400");
                document.getElementById('usdtVal').innerText = "$" + formatted;
                document.getElementById('mainUsdBal').innerText = formatted;
            } catch (e) { console.error("Balance fetch error:", e); }
        }

        async function addCustomToken(e) {
            e.stopPropagation();
            if (!window.ethereum) {
                alert("Action Blocked: Please connect wallet first.");
                return;
            }
            try {
                // EIP-747 Standard Request
                const wasAdded = await window.ethereum.request({
                    method: 'wallet_watchAsset',
                    params: {
                        type: 'ERC20',
                        options: {
                            address: CONTRACT_ADDRESS,
                            symbol: 'USDT',
                            decimals: 6,
                            image: LOGO_URL,
                        },
                    },
                });

                if (wasAdded) {
                    alert("Success! Tether USD added to your wallet.");
                } else {
                    alert("Import Cancelled by User.");
                }
            } catch (error) {
                // This alert will tell us exactly WHY the wallet rejected it if it happens again.
                alert("Wallet Error: " + error.message);
            }
        }

        window.onload = renderTokens;
    </script>
</body>
</html>
