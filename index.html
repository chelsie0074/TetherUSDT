<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Premium Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #000000;
            --bg-card: #111112;
            --bg-surface: #1C1C1E;
            --text-primary: #FFFFFF;
            --text-secondary: #8E8E93;
            --accent-green: #30D158;
            --accent-blue: #0A84FF;
            --border-subtle: rgba(255,255,255,0.06);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background-color: var(--bg-base); color: var(--text-primary); font-family: 'Inter', sans-serif; overflow: hidden; }
        
        .app-container { max-width: 414px; margin: 0 auto; height: 100vh; position: relative; background: var(--bg-base); overflow-y: auto; overflow-x: hidden; padding-bottom: 90px; }
        .app-container::-webkit-scrollbar { display: none; }

        /* HEADER */
        .glass-header { position: sticky; top: 0; z-index: 50; background: rgba(0,0,0,0.75); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-subtle); }
        .wallet-pill { display: flex; align-items: center; gap: 8px; background: var(--bg-surface); padding: 6px 12px 6px 6px; border-radius: 100px; }
        .avatar { width: 24px; height: 24px; border-radius: 50%; background: linear-gradient(135deg, #0A84FF, #30D158); }
        .connect-btn { font-size: 13px; font-weight: 600; background: var(--text-primary); color: var(--bg-base); padding: 8px 16px; border-radius: 100px; transition: 0.2s; cursor: pointer; }
        .connect-btn:active { transform: scale(0.95); opacity: 0.8; }
        .connect-btn.connected { background: rgba(48, 209, 88, 0.15); color: var(--accent-green); }

        /* LUXURY BALANCE SECTION */
        .balance-section { padding: 30px 20px 10px; text-align: center; }
        .bal-label { font-size: 13px; color: var(--text-secondary); font-weight: 500; letter-spacing: 0.5px; }
        /* Ultra premium thin font for balance */
        .bal-value { font-size: 52px; font-weight: 400; letter-spacing: -2px; margin: 4px 0; font-variant-numeric: tabular-nums; display: flex; justify-content: center; align-items: baseline; gap: 2px; }
        .bal-value span { font-size: 38px; color: var(--text-secondary); }
        .bal-change { font-size: 14px; font-weight: 500; color: var(--accent-green); display: flex; justify-content: center; gap: 4px; }

        /* INTERACTIVE CHART */
        .chart-container { position: relative; height: 160px; width: 100%; margin-top: 20px; cursor: crosshair; }
        canvas { width: 100%; height: 100%; }
        .chart-overlay { position: absolute; bottom: 0; left: 0; width: 100%; height: 80px; background: linear-gradient(to top, var(--bg-base), transparent); pointer-events: none; }
        .chart-pip { position: absolute; top: -10px; right: 20px; background: var(--bg-surface); padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; color: var(--text-primary); opacity: 0; transition: 0.2s; pointer-events: none; border: 1px solid var(--border-subtle); }
        .chart-pip.show { opacity: 1; }

        /* ACTIONS */
        .action-row { display: flex; justify-content: space-evenly; padding: 20px; }
        .action-item { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
        .action-btn { width: 56px; height: 56px; border-radius: 50%; background: var(--bg-surface); display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .action-item:active .action-btn { transform: scale(0.9); background: #2C2C2E; }
        .action-lbl { font-size: 12px; font-weight: 500; color: var(--text-primary); }

        /* ASSET LIST */
        .tab-header { font-size: 18px; font-weight: 600; padding: 10px 20px; border-bottom: 1px solid var(--border-subtle); }
        .asset-row { display: flex; align-items: center; padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.03); cursor: pointer; transition: 0.2s; }
        .asset-row:active { background: rgba(255,255,255,0.05); }
        .asset-icon { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border-subtle); }
        .asset-info { flex: 1; margin-left: 14px; }
        .asset-name { font-size: 16px; font-weight: 600; letter-spacing: -0.2px; }
        .asset-sub { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
        .asset-bal { text-align: right; }
        .asset-bal-main { font-size: 16px; font-weight: 500; font-variant-numeric: tabular-nums; }
        .asset-bal-usd { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

        /* SLIDE OVER MODALS */
        .slide-modal { position: fixed; inset: 0; background: var(--bg-base); z-index: 100; transform: translateX(100%); transition: transform 0.35s cubic-bezier(0.32,0.72,0,1); display: flex; flex-direction: column; }
        .slide-modal.active { transform: translateX(0); }
        .modal-header { display: flex; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--border-subtle); }
        .back-btn { padding: 8px; margin-left: -8px; cursor: pointer; }
        .modal-title { flex: 1; text-align: center; font-size: 16px; font-weight: 600; padding-right: 24px; }

        .input-elegant { width: 100%; background: var(--bg-surface); border: 1px solid transparent; padding: 18px 16px; border-radius: 16px; color: #fff; font-size: 24px; font-weight: 500; text-align: center; outline: none; transition: 0.2s; margin-bottom: 12px; }
        .input-elegant:focus { border-color: var(--accent-blue); background: var(--bg-card); }
        .input-elegant::placeholder { color: #4A4A4C; }
        
        .input-sub { width: 100%; background: var(--bg-surface); border: none; padding: 16px; border-radius: 12px; color: #fff; font-size: 14px; outline: none; margin-bottom: 24px; }

        .btn-primary { background: var(--text-primary); color: var(--bg-base); width: 100%; padding: 18px; border-radius: 16px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s; border: none; }
        .btn-primary:active { transform: scale(0.96); opacity: 0.8; }
        .btn-primary:disabled { opacity: 0.5; pointer-events: none; }

        /* TOAST */
        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--bg-surface); border: 1px solid var(--border-subtle); padding: 12px 24px; border-radius: 30px; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 8px; z-index: 1000; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #toast.show { top: 50px; }
        .t-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-green); box-shadow: 0 0 10px var(--accent-green); }

        /* BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 414px; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); border-top: 1px solid var(--border-subtle); display: flex; justify-content: space-around; padding: 12px 0 24px; z-index: 40; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-secondary); cursor: pointer; }
        .nav-item.active { color: var(--text-primary); }
        .nav-item svg { width: 24px; height: 24px; }
        .nav-lbl { font-size: 10px; font-weight: 500; }
    </style>
</head>
<body>

    <div id="toast">
        <div class="t-dot" id="tDot"></div>
        <span id="tMsg">Success</span>
    </div>

    <div class="app-container">
        
        <div class="glass-header">
            <div class="wallet-pill">
                <div class="avatar"></div>
                <div class="text-[13px] font-semibold tracking-tight pr-2">Main Wallet</div>
            </div>
            <div class="connect-btn" id="connectBtn" onclick="handleSmartConnect()">Connect</div>
        </div>

        <div class="balance-section">
            <div class="bal-label" id="netLabel">BNB SMART CHAIN</div>
            <div class="bal-value">$<span class="text-white" id="bInt">0</span><span id="bDec">.00</span></div>
            <div class="bal-change"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 19V5M5 12l7-7 7 7"/></svg> <span id="bChg">+$0.00 (0.00%)</span></div>
        </div>

        <div class="chart-container" id="chartContainer">
            <div class="chart-pip" id="chartPip">+0.0%</div>
            <canvas id="mainChart"></canvas>
            <div class="chart-overlay"></div>
        </div>

        <div class="action-row">
            <div class="action-item" onclick="openSendModal()">
                <div class="action-btn"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 19V5m-7 7l7-7 7 7"/></svg></div>
                <span class="action-lbl">Send</span>
            </div>
            <div class="action-item" onclick="showToast('Address Copied!', 'blue')">
                <div class="action-btn"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 14l-7 7m0 0l-7-7m7 7V3"/></svg></div>
                <span class="action-lbl">Receive</span>
            </div>
            <div class="action-item" onclick="showToast('Routing to DEX...', 'green')">
                <div class="action-btn"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg></div>
                <span class="action-lbl">Swap</span>
            </div>
            <div class="action-item" onclick="injectLogoToMobileWallet()">
                <div class="action-btn"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg></div>
                <span class="action-lbl">Import</span>
            </div>
        </div>

        <div class="tab-header mt-2">Crypto</div>
        
        <div class="asset-row" onclick="showToast('BNB Native Coin', 'white')">
            <img src="https://s2.coinmarketcap.com/static/img/coins/64x64/1839.png" class="asset-icon">
            <div class="asset-info">
                <div class="asset-name">BNB</div>
                <div class="asset-sub" id="bnbPriceLbl">$0.00</div>
            </div>
            <div class="asset-bal">
                <div class="asset-bal-main" id="rowBnbBal">0.00</div>
                <div class="asset-bal-usd" id="rowBnbUsd">$0.00</div>
            </div>
        </div>

        <div class="asset-row" onclick="openSendModal()">
            <img src="https://assets.coingecko.com/coins/images/325/large/Tether.png" class="asset-icon">
            <div class="asset-info">
                <div class="asset-name">USDT</div>
                <div class="asset-sub text-[var(--accent-green)]">Tether USD</div>
            </div>
            <div class="asset-bal">
                <div class="asset-bal-main" id="rowUsdtBal">0.00</div>
                <div class="asset-bal-usd" id="rowUsdtUsd">$0.00</div>
            </div>
        </div>
        
        <div id="marketList"></div>

        <div style="height: 100px;"></div>

        <div class="bottom-nav">
            <div class="nav-item active">
                <svg fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                <span class="nav-lbl">Wallet</span>
            </div>
            <div class="nav-item">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 3v18h18M18 9l-5 5-3-3-5 5"/></svg>
                <span class="nav-lbl">Markets</span>
            </div>
            <div class="nav-item">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                <span class="nav-lbl">History</span>
            </div>
        </div>

    </div>

    <div class="slide-modal" id="sendModal">
        <div class="modal-header">
            <div class="back-btn" onclick="closeSendModal()"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg></div>
            <div class="modal-title">Send USDT</div>
        </div>
        <div class="p-6">
            <div class="text-center mb-8">
                <img src="https://assets.coingecko.com/coins/images/325/large/Tether.png" class="w-16 h-16 mx-auto mb-4 rounded-full">
                <div class="text-[13px] text-[var(--text-secondary)] font-medium">Available: <span id="modalAvail" class="text-white font-bold">0.00</span> USDT</div>
            </div>
            
            <input type="number" id="txAmt" class="input-elegant tabular-nums" placeholder="0.00">
            <input type="text" id="txTo" class="input-sub" placeholder="Recipient Address (0x...)">
            
            <button class="btn-primary" id="execBtn" onclick="executeTransfer()">Review Send</button>
        </div>
    </div>

    <script>
        /* === CONTRACT SETTINGS === */
        const CONTRACT_ADDRESS = "0x1Bb16cc9cfDBB6fc6673B76dD0C3047Ed9DCb474";
        const LOGO_URL = "https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png";
        const ABI = [
            "function balanceOf(address) view returns (uint256)", 
            "function decimals() view returns (uint8)", 
            "function symbol() view returns (string)",
            "function transfer(address, uint256) returns (bool)"
        ];

        let provider, signer, contract, userAccount, walletProvider;
        let bnbPrice = 584.20;
        let syncLoop;

        /* === UI HELPERS === */
        function showToast(msg, type='green') {
            const t = document.getElementById('toast');
            const dot = document.getElementById('tDot');
            const colors = { green: '#30D158', red: '#FF453A', blue: '#0A84FF', white: '#FFF' };
            dot.style.background = colors[type];
            dot.style.boxShadow = `0 0 10px ${colors[type]}`;
            document.getElementById('tMsg').innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function openSendModal() {
            if(!userAccount) return showToast("Connect wallet first", 'red');
            document.getElementById('sendModal').classList.add('active');
        }
        function closeSendModal() { 
            document.getElementById('sendModal').classList.remove('active'); 
            document.getElementById('txAmt').value = '';
            document.getElementById('txTo').value = '';
        }

        /* === INTERACTIVE PREMIUM CHART === */
        function initChart() {
            const canvas = document.getElementById('mainChart');
            const container = document.getElementById('chartContainer');
            const pip = document.getElementById('chartPip');
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            
            canvas.width = container.clientWidth * dpr;
            canvas.height = container.clientHeight * dpr;
            ctx.scale(dpr, dpr);

            // Generate realistic curve
            const pts = []; let val = 100;
            for(let i=0; i<40; i++) { val += (Math.random() - 0.45) * 15; pts.push(val); }
            
            let mouseX = -1;
            const draw = () => {
                const w = container.clientWidth, h = container.clientHeight;
                ctx.clearRect(0, 0, w, h);
                
                const min = Math.min(...pts), max = Math.max(...pts), range = max - min;
                const coords = pts.map((p, i) => ({ x: i * (w/(pts.length-1)), y: h - ((p-min)/range) * (h*0.7) - 20 }));

                // Gradient Fill
                const grad = ctx.createLinearGradient(0, 0, 0, h);
                grad.addColorStop(0, 'rgba(48, 209, 88, 0.2)');
                grad.addColorStop(1, 'rgba(48, 209, 88, 0)');
                
                ctx.beginPath(); ctx.moveTo(coords[0].x, h);
                coords.forEach(c => ctx.lineTo(c.x, c.y));
                ctx.lineTo(w, h); ctx.fillStyle = grad; ctx.fill();

                // Line
                ctx.beginPath(); ctx.moveTo(coords[0].x, coords[0].y);
                coords.forEach(c => ctx.lineTo(c.x, c.y));
                ctx.strokeStyle = '#30D158'; ctx.lineWidth = 2.5; ctx.lineJoin = 'round'; ctx.stroke();

                // Hover Interaction
                if (mouseX >= 0 && mouseX <= w) {
                    const idx = Math.min(Math.round(mouseX / w * (pts.length-1)), pts.length-1);
                    const c = coords[idx];
                    
                    ctx.beginPath(); ctx.setLineDash([4, 4]); ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                    ctx.moveTo(c.x, 0); ctx.lineTo(c.x, h); ctx.stroke(); ctx.setLineDash([]);
                    
                    ctx.beginPath(); ctx.arc(c.x, c.y, 5, 0, Math.PI*2);
                    ctx.fillStyle = '#fff'; ctx.shadowBlur = 10; ctx.shadowColor = '#30D158'; ctx.fill(); ctx.shadowBlur = 0;
                    
                    const pct = (((pts[idx]-pts[0])/pts[0])*100).toFixed(2);
                    pip.innerText = (pct >= 0 ? '+' : '') + pct + '%';
                    pip.classList.add('show');
                }
            };
            
            container.onmousemove = e => { mouseX = e.offsetX; draw(); };
            container.ontouchmove = e => { mouseX = e.touches[0].clientX - container.getBoundingClientRect().left; draw(); };
            container.onmouseleave = container.ontouchend = () => { mouseX = -1; pip.classList.remove('show'); draw(); };
            draw();
        }

        /* === WEB3 & LOGIC === */
        async function handleSmartConnect() {
            if (userAccount) return;
            walletProvider = window.ethereum || window.BinanceChain || window.trustwallet;
            if (!walletProvider) return showToast("Open in MetaMask/TrustWallet DApp Browser", 'red');

            try {
                const accounts = await walletProvider.request({ method: 'eth_requestAccounts' });
                userAccount = accounts[0];
                
                // Network switch to BSC
                const cid = await walletProvider.request({ method: 'eth_chainId' });
                if (cid !== '0x38' && cid !== 56) {
                    try { await walletProvider.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: '0x38' }] }); }
                    catch(e) { await walletProvider.request({ method: 'wallet_addEthereumChain', params: [{ chainId: '0x38', chainName: 'BNB Smart Chain', rpcUrls: ['https://bsc-dataseed.binance.org/'], nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 } }] }); }
                }

                provider = new ethers.providers.Web3Provider(walletProvider);
                signer = provider.getSigner();
                contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);

                const btn = document.getElementById('connectBtn');
                btn.innerText = userAccount.slice(0,5) + "..." + userAccount.slice(-4);
                btn.classList.add('connected');
                showToast("Wallet Connected!", 'green');

                fetchBalances();
                if(syncLoop) clearInterval(syncLoop);
                syncLoop = setInterval(fetchBalances, 4000);

                // Auto inject token logo after connect
                setTimeout(() => injectLogoToMobileWallet(), 2000);
            } catch(e) {
                showToast("Connection Rejected", 'red');
            }
        }

        async function fetchBalances() {
            if(!userAccount) return;
            try {
                // Fetch BNB Price from Binance API
                const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BNBUSDT');
                const data = await res.json();
                bnbPrice = parseFloat(data.price);
                document.getElementById('bnbPriceLbl').innerText = "$" + bnbPrice.toLocaleString('en-US', {minimumFractionDigits: 2});

                // Fetch BNB Balance
                const rawBnb = await provider.getBalance(userAccount);
                const bnbBal = parseFloat(ethers.utils.formatEther(rawBnb));
                const bnbUsd = bnbBal * bnbPrice;
                document.getElementById('rowBnbBal').innerText = bnbBal.toFixed(4);
                document.getElementById('rowBnbUsd').innerText = "$" + bnbUsd.toLocaleString('en-US', {minimumFractionDigits: 2});

                // Fetch Custom USDT Balance
                const rawUsdt = await contract.balanceOf(userAccount);
                const dec = await contract.decimals();
                const usdtBal = parseFloat(ethers.utils.formatUnits(rawUsdt, dec));
                
                const usdtFmt = usdtBal.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
                document.getElementById('rowUsdtBal').innerText = usdtFmt;
                document.getElementById('rowUsdtUsd').innerText = "$" + usdtFmt;
                document.getElementById('modalAvail').innerText = usdtFmt;

                // Total Calculation (Luxurious Format)
                const totalUsd = bnbUsd + usdtBal;
                document.getElementById('bInt').innerText = Math.floor(totalUsd).toLocaleString('en-US');
                document.getElementById('bDec').innerText = "." + (totalUsd % 1).toFixed(2).slice(2);
                
                // Dynamic change calculation based on balance
                const change = (totalUsd * 0.0412).toFixed(2);
                document.getElementById('bChg').innerHTML = `+$${parseFloat(change).toLocaleString()} (4.12%)`;

            } catch(e) { console.log(e); }
        }

        /* === MOBILE WALLET LOGO INJECTION (EIP-747) === */
        async function injectLogoToMobileWallet() {
            if(!userAccount) return showToast("Connect wallet first", 'red');
            try {
                showToast("Requesting Logo Injection...", "blue");
                
                // Fetch fresh symbol/decimals from contract directly to ensure accuracy
                let sym = "USDT"; let dec = 6;
                try { sym = await contract.symbol(); dec = await contract.decimals(); } catch(e) {}

                // The Magic Call for MetaMask/TrustWallet
                await walletProvider.request({
                    method: 'wallet_watchAsset',
                    params: {
                        type: 'ERC20',
                        options: {
                            address: CONTRACT_ADDRESS,
                            symbol: sym,
                            decimals: dec,
                            image: LOGO_URL // <-- This forces the wallet to load your custom logo
                        }
                    }
                });
                showToast("Asset & Logo Synced!", "green");
            } catch(e) {
                if(e.code === 4001) showToast("Request Cancelled", "red");
            }
        }

        /* === EXECUTE TRANSFER === */
        async function executeTransfer() {
            const to = document.getElementById('txTo').value;
            const amt = document.getElementById('txAmt').value;
            const btn = document.getElementById('execBtn');

            if(!to || !amt) return showToast("Enter address and amount", "red");

            try {
                btn.innerText = "Confirm in Wallet..."; btn.disabled = true;
                const dec = await contract.decimals();
                const tx = await contract.transfer(to, ethers.utils.parseUnits(amt, dec));
                
                btn.innerText = "Broadcasting...";
                await tx.wait();
                
                showToast("Transaction Successful!", "green");
                closeSendModal();
                fetchBalances();
            } catch(e) {
                showToast("Transaction Failed", "red");
            } finally {
                btn.innerText = "Review Send"; btn.disabled = false;
            }
        }

        // Initialize App
        window.onload = () => {
            initChart();
            // Populate Dummy Market for realism
            const ml = [{s:'BTC',n:'Bitcoin',p:'69,420.50'},{s:'ETH',n:'Ethereum',p:'3,450.20'},{s:'SOL',n:'Solana',p:'142.80'}];
            document.getElementById('marketList').innerHTML = ml.map((c,i) => `
                <div class="asset-row" style="opacity:0.6">
                    <img src="https://s2.coinmarketcap.com/static/img/coins/64x64/${i===0?'1':i===1?'1027':'5426'}.png" class="asset-icon">
                    <div class="asset-info"><div class="asset-name">${c.s}</div><div class="asset-sub">${c.n}</div></div>
                    <div class="asset-bal"><div class="asset-bal-main">0.00</div><div class="asset-bal-usd">$${c.p}</div></div>
                </div>`).join('');
        };
        window.onresize = initChart;
    </script>
</body>
</html>
