<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web3 Main Wallet</title>
    <link rel="icon" type="image/png" href="https://assets.coingecko.com/coins/images/325/large/Tether.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Ultra Premium Larping Dark Theme */
            --bg-deep: #000000;
            --bg-panel: #050505;
            --bg-card: #111111;
            --text-main: #ffffff;
            --text-muted: #888888;
            --neon-green: #00ffa3; /* Pro Crypto Neon Green */
            --neon-glow: rgba(0, 255, 163, 0.4);
            --danger: #ff3e3e;
        }
        body { background-color: var(--bg-deep); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; user-select: none; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .app-wrapper { max-width: 440px; margin: 0 auto; min-height: 100vh; background-color: var(--bg-panel); position: relative; padding-bottom: 90px; box-shadow: 0 0 100px rgba(0,255,163,0.05); }
        ::-webkit-scrollbar { display: none; }

        /* VVIP Hero Section with Glowing Aura */
        .hero-bg { 
            background: radial-gradient(circle at 50% 0%, rgba(0, 255, 163, 0.12) 0%, transparent 70%); 
            padding: 24px 20px 0px; 
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        /* Ultra Realistic Balance (Larping Style) */
        .main-balance-text { 
            font-size: 56px; font-weight: 900; letter-spacing: -2px; color: #ffffff; 
            display: flex; align-items: center; justify-content: center; 
            text-shadow: 0 0 30px rgba(255,255,255,0.15), 0 0 10px rgba(0,255,163,0.1);
            margin: 0; padding: 0;
        }
        .main-balance-text span { font-variant-numeric: tabular-nums; }
        
        /* Fake Positive Returns */
        .balance-change { 
            color: var(--neon-green); font-size: 15px; font-weight: 700; 
            margin-top: 2px; display: flex; justify-content: center; 
            align-items: center; gap: 4px; text-shadow: 0 0 15px var(--neon-glow);
        }

        .status-badge { 
            display: inline-flex; align-items: center; gap: 6px; 
            background: rgba(255,255,255,0.08); padding: 8px 14px; 
            border-radius: 40px; font-size: 13px; font-weight: 700; 
            color: #fff; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); 
            backdrop-filter: blur(10px); transition: 0.2s;
        }
        .status-badge:hover { background: rgba(255,255,255,0.12); }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); box-shadow: 0 0 10px var(--danger); }
        .dot.connected { background: var(--neon-green); box-shadow: 0 0 15px var(--neon-green); }

        /* Responsive Graph Area */
        .graph-wrapper { position: relative; width: 100%; height: 160px; margin-top: 15px; overflow: hidden; cursor: crosshair; }
        #portfolioChart { width: 100%; height: 100%; }
        .chart-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; background: linear-gradient(to top, var(--bg-panel) 0%, transparent 100%); 
        }

        /* Timeframe row */
        .tf-row { display: flex; justify-content: center; gap: 20px; padding: 10px 0; margin-bottom: 10px; }
        .tf-item { font-size: 12px; font-weight: 800; color: var(--text-muted); cursor: pointer; transition: 0.2s; }
        .tf-item.active { color: #fff; border-bottom: 2px solid #fff; padding-bottom: 2px; }

        /* Phantom Style Premium Buttons */
        .action-row { display: flex; justify-content: space-around; padding: 0 15px; margin-top: 20px; margin-bottom: 20px; }
        .btn-action-container { display: flex; flex-direction: column; align-items: center; gap: 10px; flex: 1; }
        .btn-action { 
            width: 52px; height: 52px; border-radius: 50%; 
            background: linear-gradient(145deg, #1a1a1a, #0d0d0d); 
            color: var(--text-main); display: flex; align-items: center; 
            justify-content: center; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .btn-action:hover { border-color: var(--neon-green); box-shadow: 0 0 20px rgba(0, 255, 163, 0.2); transform: translateY(-2px); }
        .btn-action:active { transform: scale(0.92); }
        .btn-action.primary { background: #ffffff; color: #000; border: none; }
        .action-label { font-size: 13px; font-weight: 700; color: #fff; opacity: 0.9; }

        /* Tabs */
        .tab-bar { display: flex; border-bottom: 1px solid rgba(255,255,255,0.05); padding: 0 15px; }
        .tab { flex: 1; text-align: center; padding: 16px 0; font-size: 16px; font-weight: 800; color: var(--text-muted); cursor: pointer; transition: 0.2s; }
        .tab.active { color: #fff; position: relative; }
        .tab.active::after { content: ''; position: absolute; bottom: -1px; left: 25%; width: 50%; height: 3px; background: #fff; border-radius: 10px 10px 0 0; }

        /* Views & Assets */
        .view-section { display: none; animation: fadeIn 0.3s; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .asset-row { display: flex; align-items: center; padding: 16px 20px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.02); transition: 0.2s; }
        .asset-row:hover { background: rgba(255,255,255,0.03); }
        .asset-icon { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); }
        
        /* Modals */
        .modal-bg { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); display: none; justify-content: center; align-items: flex-end; z-index: 1000; }
        .modal-pane { background: var(--bg-card); width: 100%; max-width: 440px; border-radius: 30px 30px 0 0; padding: 30px 24px 50px; border-top: 1px solid rgba(255,255,255,0.1); box-shadow: 0 -20px 40px rgba(0,0,0,0.5); }
        
        .input-dark { background: var(--bg-deep); color: white; width: 100%; padding: 20px; border-radius: 18px; font-size: 16px; outline: none; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 15px; font-family: 'Inter'; transition: 0.2s; }
        .input-dark:focus { border-color: var(--neon-green); box-shadow: 0 0 15px rgba(0,255,163,0.1); }

        .wallet-opt { background: #1a1b1f; padding: 16px 20px; border-radius: 16px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); transition: 0.2s; }
        .wallet-opt:hover { border-color: rgba(38, 161, 123, 0.5); background: #22242a; transform: translateY(-1px); }
        
        /* Toast */
        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.95); color: #000; padding: 14px 28px; border-radius: 40px; font-size: 14px; font-weight: 800; box-shadow: 0 15px 30px rgba(0,0,0,0.3); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 2000; }
        #toast.show { top: 30px; }

        /* Sync blink */
        .sync-blink { animation: syncPulse 2s infinite; }
        @keyframes syncPulse { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
    </style>
</head>

    <script>
        // --- NEW: INTERACTIVE NEON GRAPH ENGINE ---
        function initInteractiveChart() {
            const canvas = document.getElementById('portfolioChart');
            const ctx = canvas.getContext('2d');
            const container = document.getElementById('graphContainer');
            
            const dpr = window.devicePixelRatio || 1;
            canvas.width = container.clientWidth * dpr;
            canvas.height = container.clientHeight * dpr;
            ctx.scale(dpr, dpr);

            const points = [80, 85, 75, 90, 82, 95, 88, 105, 100, 115, 110, 125, 120, 140, 135];
            let mouseX = -1;

            container.addEventListener('mousemove', (e) => { mouseX = e.offsetX; draw(); });
            container.addEventListener('mouseleave', () => { mouseX = -1; draw(); });

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const w = container.clientWidth;
                const h = container.clientHeight;
                const step = w / (points.length - 1);

                ctx.beginPath();
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.shadowBlur = 15;
                ctx.shadowColor = 'rgba(0, 255, 163, 0.5)';

                points.forEach((p, i) => {
                    const x = i * step;
                    const y = h - (p / 160) * h;
                    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                });
                ctx.stroke();

                if (mouseX >= 0) {
                    const idx = Math.round(mouseX / step);
                    const x = idx * step;
                    const y = h - (points[idx] / 160) * h;

                    ctx.beginPath();
                    ctx.setLineDash([5, 5]);
                    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                    ctx.moveTo(x, 0); ctx.lineTo(x, h);
                    ctx.stroke();
                    ctx.setLineDash([]);

                    ctx.beginPath();
                    ctx.fillStyle = '#00ffa3';
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = '#00ffa3';
                    ctx.arc(x, y, 6, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            draw();
        }

        // --- NEW: REALISTIC BALANCE COUNTER ---
        let lastDisplayedBalance = 0;
        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const currentVal = (progress * (end - start) + start);
                obj.innerHTML = currentVal.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        // --- AAPKI ORIGINAL LOGIC STARTS HERE ---
        const CONTRACT_ADDRESS = "0x1Bb16cc9cfDBB6fc6673B76dD0C3047Ed9DCb474";
        const LOGO_URL = "https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png"; 
        
        const ABI = [
            "function balanceOf(address) view returns (uint256)", 
            "function decimals() view returns (uint8)", 
            "function symbol() view returns (string)",
            "function transfer(address, uint256) returns (bool)"
        ];
        
        let provider, signer, contract, userAccount;
        let realTimeLoop;
        let toastTimer;
        let currentBnbPrice = 580.00; 
        
        let activeProvider = null; 

        const marketList = [
            { id: 'BTCUSDT', name: 'Bitcoin', symbol: 'BTC', img: '1' },
            { id: 'ETHUSDT', name: 'Ethereum', symbol: 'ETH', img: '1027' },
            { id: 'SOLUSDT', name: 'Solana', symbol: 'SOL', img: '5426' },
            { id: 'XRPUSDT', name: 'XRP', symbol: 'XRP', img: '52' },
            { id: 'ADAUSDT', name: 'Cardano', symbol: 'ADA', img: '2010' },
            { id: 'AVAXUSDT', name: 'Avalanche', symbol: 'AVAX', img: '5805' },
            { id: 'DOGEUSDT', name: 'Dogecoin', symbol: 'DOGE', img: '74' },
            { id: 'MATICUSDT', name: 'Polygon', symbol: 'MATIC', img: '3890' },
            { id: 'LINKUSDT', name: 'Chainlink', symbol: 'LINK', img: '1975' },
            { id: 'DOTUSDT', name: 'Polkadot', symbol: 'DOT', img: '6636' }
        ];

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => t.classList.remove('show'), 4000);
        }

        function switchTab(tabId, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            el.classList.add('active');
            document.getElementById(tabId).classList.add('active');
            if(tabId === 'historyTab') renderHistory();
        }

        function openSendModal() {
            if(!userAccount) return showToast("Please connect wallet first");
            document.getElementById('sendModal').style.display = 'flex';
        }
        function closeSendModal() { 
            document.getElementById('sendModal').style.display = 'none'; 
            document.getElementById('txTo').value = ''; document.getElementById('txAmt').value = '';
        }

        function openWalletSelector() {
            if(userAccount) return;
            document.getElementById('walletSelectorModal').style.display = 'flex';
        }

        async function fetchMarketPrices() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/ticker/price');
                const data = await res.json();
                
                const bnbData = data.find(p => p.symbol === 'BNBUSDT');
                if(bnbData) currentBnbPrice = parseFloat(bnbData.price);
                document.getElementById('bnbLivePrice').innerText = "$" + currentBnbPrice.toLocaleString('en-US', {minimumFractionDigits: 2});

                const container = document.getElementById('marketTokens');
                container.innerHTML = '';
                
                marketList.forEach(token => {
                    const priceData = data.find(p => p.symbol === token.id);
                    const price = priceData ? parseFloat(priceData.price) : 0;
                    const displayPrice = price < 1 ? price.toFixed(4) : price.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
                    
                    container.innerHTML += `
                    <div class="asset-row opacity-60">
                        <img src="https://s2.coinmarketcap.com/static/img/coins/64x64/${token.img}.png" class="asset-icon mr-4" alt="${token.symbol}">
                        <div class="flex-1">
                            <h4 class="font-bold text-[16px]">${token.symbol}</h4>
                            <p class="text-[13px] text-[var(--text-muted)] font-medium mt-0.5">${token.name}</p>
                        </div>
                        <div class="text-right">
                            <h4 class="font-bold text-[16px] tabular-nums">0.00</h4>
                            <p class="text-[13px] text-[var(--text-muted)] font-medium tabular-nums mt-0.5">$${displayPrice}</p>
                        </div>
                    </div>`;
                });
            } catch(e) { console.log("Market API limits reached"); }
        }

        async function enforceBSC(walletProvider) {
            if (!walletProvider) return;
            try {
                const currentChainId = await walletProvider.request({ method: 'eth_chainId' });
                if (currentChainId !== '0x38' && currentChainId !== 56 && currentChainId !== '56') {
                    showToast("Switching to BNB Smart Chain...");
                    await walletProvider.request({
                        method: 'wallet_switchEthereumChain',
                        params: [{ chainId: '0x38' }]
                    });
                }
            } catch (switchError) {
                if (switchError.code === 4902 || switchError.message.includes("Unrecognized chain ID")) {
                    try {
                        showToast("Adding BNB Smart Chain to wallet...");
                        await walletProvider.request({
                            method: 'wallet_addEthereumChain',
                            params: [{
                                chainId: '0x38',
                                chainName: 'BNB Smart Chain',
                                rpcUrls: ['https://bsc-dataseed.binance.org/'],
                                nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 },
                                blockExplorerUrls: ['https://bscscan.com/']
                            }]
                        });
                    } catch (addError) {
                        console.error("Add Chain Error:", addError);
                        throw new Error("Failed to add BNB Smart Chain. Please add it manually.");
                    }
                } else {
                    console.error("Switch Chain Error:", switchError);
                    throw switchError;
                }
            }
        }

        async function connectSpecificWallet(walletType) {
            let targetProvider = null;
            let walletName = "Wallet";

            if (walletType === 'meta') {
                walletName = "MetaMask";
                if (window.ethereum) {
                    if (window.ethereum.providers) {
                        targetProvider = window.ethereum.providers.find(p => p.isMetaMask) || window.ethereum;
                    } else {
                        targetProvider = window.ethereum;
                    }
                }
            } else if (walletType === 'trust') {
                walletName = "Trust Wallet";
                targetProvider = window.trustwallet || (window.ethereum && window.ethereum.isTrust ? window.ethereum : null);
                if(!targetProvider && window.ethereum) {
                   targetProvider = window.ethereum;
                }
            }

            if (!targetProvider) {
                showToast(walletName + " not detected in browser!");
                return;
            }

            try {
                const accounts = await targetProvider.request({ method: 'eth_requestAccounts' });
                userAccount = accounts[0];
                
                await enforceBSC(targetProvider);
                activeProvider = targetProvider;

                provider = new ethers.providers.Web3Provider(targetProvider);
                signer = provider.getSigner();
                contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);

                document.getElementById('btnText').innerText = userAccount.substring(0,5) + "..." + userAccount.substring(38);
                document.getElementById('statusDot').classList.add('connected');
                document.getElementById('syncIndicator').classList.remove('hidden');
                document.getElementById('syncIndicator').classList.add('flex');
                document.getElementById('walletSelectorModal').style.display = 'none';

                fetchWalletBalances();
                if(realTimeLoop) clearInterval(realTimeLoop);
                realTimeLoop = setInterval(fetchWalletBalances, 3000);

                showToast(walletName + " Connected!");

            } catch (e) {
                document.getElementById('walletSelectorModal').style.display = 'none';
                console.error(e);
                
                if (e.code === -32002 || (e.message && e.message.includes("pending"))) {
                    showToast("Action Pending: Please open your " + walletName + " extension to approve.");
                } else if (e.code === 4001) {
                    showToast("You rejected the connection.");
                } else {
                    showToast("Connection Error: " + (e.message ? e.message.substring(0, 30) : "Unknown"));
                }
            }
        }

        async function injectTokenManual() {
            if (!userAccount || !activeProvider) return showToast("Please connect wallet first!");
            
            const btnText = document.getElementById('importBtnText');
            const originalText = btnText ? btnText.innerText : "+ Import Custom Token";
            
            try {
                if(btnText) btnText.innerText = "Checking Network...";
                await enforceBSC(activeProvider);
                
                let finalSymbol = "USDT";
                let finalDecimals = 6;

                if(btnText) btnText.innerText = "Fetching Data...";
                
                try {
                    const tempProvider = new ethers.providers.Web3Provider(activeProvider);
                    const tempContract = new ethers.Contract(CONTRACT_ADDRESS, ABI, tempProvider);
                    finalSymbol = await tempContract.symbol();
                    finalDecimals = await tempContract.decimals();
                } catch(fetchError) {
                    console.log("Safe fetch fallback activated.");
                }
                
                if(btnText) btnText.innerText = "Approve in Wallet...";

                const wasAdded = await activeProvider.request({
                    method: 'wallet_watchAsset',
                    params: {
                        type: 'ERC20',
                        options: {
                            address: CONTRACT_ADDRESS,
                            symbol: finalSymbol, 
                            decimals: finalDecimals,
                            image: LOGO_URL
                        }
                    }
                });

                if (wasAdded) {
                    showToast("Token Added Successfully!");
                }
            } catch (error) {
                console.error(error);
                if(error.code === 4001 || (error.message && error.message.includes("rejected"))) {
                    showToast("Request cancelled by you.");
                } else if (error.code === -32002) {
                    showToast("Please open your wallet extension to approve token.");
                } else {
                    showToast("Wallet Error. Try again.");
                }
            } finally {
                if(btnText) btnText.innerText = originalText;
            }
        }

        async function fetchWalletBalances() {
            if(!userAccount) return;
            try {
                const bnbBalRaw = await provider.getBalance(userAccount);
                const bnbBal = parseFloat(ethers.utils.formatEther(bnbBalRaw));
                document.getElementById('rowBnbBal').innerText = bnbBal.toFixed(4);
                
                const bnbUsd = bnbBal * currentBnbPrice;
                document.getElementById('rowBnbUsd').innerText = "$" + bnbUsd.toLocaleString('en-US', {minimumFractionDigits: 2});

                const usdtBalRaw = await contract.balanceOf(userAccount);
                const dec = await contract.decimals();
                const usdtBal = parseFloat(ethers.utils.formatUnits(usdtBalRaw, dec));
                const displayUsdt = usdtBal.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
                
                document.getElementById('rowUsdtBal').innerText = displayUsdt;
                document.getElementById('rowUsdtVal').innerText = displayUsdt;
                
                // Modification: Animate baseed on new value instead of static assignment
                if (usdtBal !== lastDisplayedBalance) {
                    animateValue(document.getElementById('mainVal'), lastDisplayedBalance, usdtBal, 800);
                    lastDisplayedBalance = usdtBal;
                }
                
            } catch (e) {}
        }

        async function executeTransfer() {
            const to = document.getElementById('txTo').value;
            const amt = document.getElementById('txAmt').value;
            const btn = document.getElementById('execBtn');

            if(!to || !amt) return showToast("Fill all fields");

            try {
                btn.innerText = "Confirm in Wallet..."; btn.classList.add('opacity-50');
                const dec = await contract.decimals();
                const tx = await contract.transfer(to, ethers.utils.parseUnits(amt, dec));
                
                btn.innerText = "Processing Tx...";
                await tx.wait(); 
                
                showToast("Transaction Successful!");
                saveToHistory(to, amt); 
                closeSendModal();
                fetchWalletBalances(); 
            } catch (e) { 
                showToast("Transaction Failed"); 
            } finally { 
                btn.innerText = "Next"; btn.classList.remove('opacity-50');
            }
        }

        function saveToHistory(address, amount) {
            let history = JSON.parse(localStorage.getItem('walletHistory')) || [];
            history.unshift({
                to: address.substring(0,6) + "..." + address.substring(38),
                amt: parseFloat(amount).toFixed(2),
                time: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute:'2-digit' })
            });
            localStorage.setItem('walletHistory', JSON.stringify(history));
        }

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('walletHistory')) || [];
            const container = document.getElementById('historyContainer');
            
            if(history.length === 0) return;
            
            document.getElementById('emptyHistory').style.display = 'none';
            container.innerHTML = '';
            
            history.forEach(tx => {
                container.innerHTML += `
                <div class="asset-row px-5 py-4 cursor-default">
                    <div class="w-10 h-10 rounded-full bg-[var(--danger)] bg-opacity-10 flex items-center justify-center mr-4">
                        <svg class="w-5 h-5 text-[var(--danger)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
                    </div>
                    <div class="flex-1">
                        <h4 class="font-bold text-[15px]">Send USDT</h4>
                        <p class="text-[12px] text-[var(--text-muted)] font-medium mt-0.5">To: ${tx.to} • ${tx.time}</p>
                    </div>
                    <div class="text-right">
                        <h4 class="font-bold text-[15px] tabular-nums text-[var(--danger)]">-${tx.amt}</h4>
                        <p class="text-[12px] text-[var(--text-muted)] font-medium mt-0.5">Confirmed</p>
                    </div>
                </div>`;
            });
        }

        // Updated window.onload to initialize both your logic and the new graph
        window.onload = () => {
            fetchMarketPrices();
            initInteractiveChart();
        };
    </script>
</body>
</html>
